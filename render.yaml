services:
  - type: web
    name: finance-tracker-api
    runtime: node
    buildCommand: npm install && npm run build:server
    startCommand: npm run start:server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false   # Set this in the Render dashboard (MongoDB Atlas connection string)
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: CORS_ORIGIN
        sync: false   # Set this to your Vercel URL e.g. https://your-app.vercel.app
      - key: PORT
        value: 10000  # Render assigns port 10000 by default
